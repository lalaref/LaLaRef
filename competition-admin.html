<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>賽事管理 Admin | LaLaRef</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,'Microsoft JhengHei',sans-serif;background:#1a1a2e;color:#e0e0e0;min-height:100vh}
.topbar{background:linear-gradient(145deg,#d4a574,#c89860);padding:14px 24px;display:flex;justify-content:space-between;align-items:center}
.topbar h1{color:#fff;font-size:1.2em;font-weight:900}.topbar a{color:#fff;text-decoration:none;font-size:.85em;opacity:.85}
.tabs{display:flex;gap:0;background:#16213e;border-bottom:2px solid #0f3460;overflow-x:auto}
.tab{padding:12px 24px;cursor:pointer;font-size:.88em;color:#a0a0b0;border-bottom:3px solid transparent;white-space:nowrap;transition:all .2s}
.tab:hover,.tab.active{color:#d4a574;border-bottom-color:#d4a574;background:#0f3460}
.main{max-width:1200px;margin:0 auto;padding:24px}
.panel{display:none}.panel.active{display:block}
.card{background:#16213e;border-radius:16px;padding:24px;margin-bottom:20px}
.card h2{font-size:1.1em;color:#d4a574;font-weight:900;margin-bottom:16px}
.form-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:.78em;color:#a0a0b0;font-weight:700;text-transform:uppercase}
input,select,textarea{background:#0f3460;border:1px solid #2a4a7f;border-radius:8px;padding:9px 12px;color:#e0e0e0;font-size:.9em;font-family:inherit;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:#d4a574}
textarea{resize:vertical;min-height:80px}
.btn{padding:9px 20px;border-radius:10px;border:none;cursor:pointer;font-weight:700;font-size:.88em;transition:all .2s}
.btn-p{background:linear-gradient(145deg,#d4a574,#c89860);color:#fff}.btn-p:hover{opacity:.9}
.btn-d{background:#dc3545;color:#fff}.btn-d:hover{opacity:.9}
.btn-s{background:#198754;color:#fff}.btn-s:hover{opacity:.9}
.btn-o{background:transparent;border:1px solid #d4a574;color:#d4a574}.btn-o:hover{background:#d4a574;color:#fff}
.btn-sm{padding:5px 12px;font-size:.8em}
.comp-item{background:#0f3460;border-radius:12px;padding:16px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.ci-name{font-weight:700}.ci-meta{font-size:.8em;color:#a0a0b0;margin-top:3px}
.ci-actions{display:flex;gap:8px;flex-shrink:0}
.badge{display:inline-block;padding:3px 10px;border-radius:10px;font-size:.75em;font-weight:700}
.badge.upcoming{background:#fff3cd;color:#856404}.badge.ongoing{background:#d1e7dd;color:#0a3622}.badge.completed{background:#cfe2ff;color:#084298}
.token-tag{background:#0f3460;border-radius:8px;padding:3px 10px;font-size:.8em;color:#d4a574;font-family:monospace}
.alert{padding:12px 16px;border-radius:10px;margin-bottom:14px;font-size:.88em}
.alert-success{background:#0a3622;color:#75b798;border:1px solid #198754}
.alert-error{background:#2c0b0e;color:#ea868f;border:1px solid #dc3545}
.section-title{font-size:.85em;color:#a0a0b0;font-weight:700;text-transform:uppercase;margin:18px 0 10px;display:flex;justify-content:space-between;align-items:center}
.dyn-row{display:flex;gap:8px;margin-bottom:8px;align-items:center;flex-wrap:wrap}
.dyn-row input,.dyn-row select{flex:1;min-width:100px}
.dyn-row input:first-child{max-width:160px;flex:0 0 160px}
/* Match editor */
.me-row{background:#0f3460;border-radius:10px;padding:14px;margin-bottom:8px}
.me-grid{display:grid;grid-template-columns:60px 120px 1fr 50px 20px 50px 1fr 100px;gap:8px;align-items:center;font-size:.85em}
.me-grid input,.me-grid select{padding:7px 8px;font-size:.85em}
.me-label{font-size:.75em;color:#a0a0b0;margin-top:6px}
.me-source{display:flex;gap:6px;align-items:center;font-size:.78em;color:#a0a0b0;margin-top:6px;flex-wrap:wrap}
.me-source select,.me-source input{font-size:.78em;padding:4px 6px;width:auto;min-width:80px}
.vs-lbl{text-align:center;color:#a0a0b0;font-size:.85em}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-box{background:#16213e;border-radius:20px;padding:40px;width:100%;max-width:400px}
.login-box h2{color:#d4a574;font-size:1.4em;margin-bottom:24px;text-align:center}
.help-text{font-size:.78em;color:#7a8a9a;margin-top:4px;line-height:1.4}
@media(max-width:768px){
  .me-grid{grid-template-columns:1fr;gap:6px}
  .form-row{grid-template-columns:1fr}
  .main{padding:12px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginScreen">
  <div class="login-box">
    <h2>🏀 賽事管理</h2>
    <div id="loginAlert"></div>
    <div class="fg" style="margin-bottom:14px"><label for="masterPwInput">主密碼 Master Password</label><input type="password" id="masterPwInput" placeholder="管理所有賽事"></div>
    <button class="btn btn-p" style="width:100%" onclick="masterLogin()">登入</button>
    <div style="margin-top:20px;border-top:1px solid #2a4a7f;padding-top:16px">
      <p style="font-size:.82em;color:#a0a0b0;margin-bottom:10px">或以 Token 管理單一賽事：</p>
      <div class="fg" style="margin-bottom:10px"><label for="tokenInput" style="display:none">賽事 Token</label><input id="tokenInput" placeholder="賽事 Token"></div>
      <div class="fg" style="margin-bottom:14px"><label for="tokenPwInput" style="display:none">賽事密碼</label><input type="password" id="tokenPwInput" placeholder="賽事密碼"></div>
      <button class="btn btn-o" style="width:100%" onclick="tokenLogin()">以 Token 登入</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="mainApp" style="display:none">
<div class="topbar"><h1>🏀 LaLaRef 賽事管理</h1><a href="#" onclick="logout()">登出</a></div>
<div class="tabs" id="tabBar">
  <div class="tab active" onclick="showTab('list')">📋 賽事列表</div>
  <div class="tab" onclick="showTab('create')" id="tabCreate">➕ 新增賽事</div>
  <div class="tab" onclick="showTab('edit')" id="tabEdit" style="display:none">⚙️ 編輯賽事</div>
</div>
<div class="main">
  <div id="globalAlert"></div>
  <div class="panel active" id="p-list"><div class="card"><h2>所有賽事</h2><div id="compList">載入中...</div></div></div>
  <div class="panel" id="p-create"><div id="createForm"></div></div>
  <div class="panel" id="p-edit"><div id="editForm"></div></div>
</div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxq3ceJ-DTir4jHj8KunM9_HgfYpAprwqO0ue1zzZj3wGHj3ln-1MLwTzbnJCpWCc-E1g/exec';
let S = { type:null, masterPw:null, token:null, tokenPw:null, comp:null };

async function masterLogin() {
  const pw = document.getElementById('masterPwInput').value.trim();
  if(!pw) return;
  const r = await api({action:'listAll',masterPassword:pw});
  if(r.success){ S={type:'master',masterPw:pw}; showApp(); renderList(r.competitions); }
  else showAlert('loginAlert',r.message||'密碼錯誤','error');
}
async function tokenLogin() {
  const t=document.getElementById('tokenInput').value.trim(), pw=document.getElementById('tokenPwInput').value.trim();
  if(!t||!pw) return;
  const r=await api({action:'verifyAdmin',token:t,password:pw});
  if(r.success){ S={type:'token',token:t,tokenPw:pw}; showApp(); document.getElementById('tabCreate').style.display='none'; openEdit(t); }
  else showAlert('loginAlert','Token 或密碼錯誤','error');
}
function logout(){ S={}; document.getElementById('loginScreen').style.display='flex'; document.getElementById('mainApp').style.display='none'; }
function showApp(){ document.getElementById('loginScreen').style.display='none'; document.getElementById('mainApp').style.display='block'; initCreate(); }
async function api(p){ return (await fetch(API_URL+'?'+new URLSearchParams(p))).json(); }

function showTab(name){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('p-'+name).classList.add('active');
  const labels={list:'列表',create:'新增',edit:'編輯'};
  document.querySelectorAll('.tab').forEach(t=>{ if(t.textContent.includes(labels[name]||'_')) t.classList.add('active'); });
}
function showAlert(id,msg,type){ const el=document.getElementById(id); if(!el)return; el.innerHTML='<div class="alert alert-'+type+'">'+msg+'</div>'; setTimeout(()=>{el.innerHTML='';},4000); }
function gv(id){ return (document.getElementById(id)||{}).value||''; }
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function getPw(){ return S.type==='master'?prompt('請輸入此賽事的管理密碼：'):S.tokenPw; }

// ── List ──
async function loadList(){ const r=await api({action:'listAll',masterPassword:S.masterPw}); if(r.success) renderList(r.competitions); }
function renderList(comps){
  const sl={upcoming:'即將舉行',ongoing:'進行中',completed:'已完結'};
  document.getElementById('compList').innerHTML = comps.length ? comps.map(c=>
    '<div class="comp-item"><div style="flex:1"><div class="ci-name">'+esc(c.name)+' <span class="badge '+c.status+'">'+
    (sl[c.status]||c.status)+'</span></div><div class="ci-meta">Token: <span class="token-tag">'+esc(c.token)+'</span> '+
    (c.date?'| '+c.date:'')+' '+(c.venue?'| '+c.venue:'')+' | '+(c.matches||[]).length+' 場</div></div>'+
    '<div class="ci-actions"><button class="btn btn-o btn-sm" onclick="openEdit(\''+esc(c.token)+'\')">管理</button>'+
    '<a href="competition.html?token='+encodeURIComponent(c.token)+'" target="_blank" class="btn btn-sm" style="background:#0f3460;color:#d4a574;border:1px solid #d4a574">公開頁</a></div></div>'
  ).join('') : '<p style="color:#a0a0b0">暫無賽事</p>';
}

// ── Create ──
function initCreate(){
  document.getElementById('createForm').innerHTML = '<div class="card"><h2>➕ 新增賽事</h2>'+
    '<div class="form-row"><div class="fg"><label>賽事名稱 (中文)</label><input id="n_name"></div><div class="fg"><label>名稱 (英文)</label><input id="n_nameEn"></div></div>'+
    '<div class="form-row"><div class="fg"><label>Token (唯一識別碼)</label><input id="n_token" placeholder="英數字"><div class="help-text">公開連結: competition.html?token=xxx</div></div>'+
    '<div class="fg"><label>賽事管理密碼</label><input type="password" id="n_pw"></div></div>'+
    '<div class="form-row"><div class="fg"><label>日期</label><input type="date" id="n_date"></div><div class="fg"><label>場地</label><input id="n_venue"></div>'+
    '<div class="fg"><label>狀態</label><select id="n_status"><option value="upcoming">即將舉行</option><option value="ongoing">進行中</option><option value="completed">已完結</option></select></div></div>'+
    '<div style="margin-top:20px"><button class="btn btn-p" onclick="doCreate()">建立賽事</button></div>'+
    '<div class="help-text" style="margin-top:10px">建立後可在「編輯賽事」中設定規則、流程及場次。</div></div>';
}
async function doCreate(){
  const r=await api({action:'create',masterPassword:S.masterPw,token:gv('n_token'),name:gv('n_name'),nameEn:gv('n_nameEn'),password:gv('n_pw'),date:gv('n_date'),venue:gv('n_venue'),status:gv('n_status')});
  showAlert('globalAlert',r.success?'✅ 賽事已建立':r.message,r.success?'success':'error');
  if(r.success) loadList();
}

// ── Edit ──
async function openEdit(token){
  const r=await api({action:'getCompetition',token:token});
  if(!r.success){ showAlert('globalAlert',r.message,'error'); return; }
  S.comp=r.competition; renderEdit(r.competition);
  document.getElementById('tabEdit').style.display='block'; showTab('edit');
}
</script>

<script>
function renderEdit(c){
  const rules=c.rules||{}, rundown=c.rundown||[], phases=c.phases||[], matches=c.matches||[];
  const sl={upcoming:'即將舉行',ongoing:'進行中',completed:'已完結'};
  const statusOpts=['upcoming','ongoing','completed'].map(s=>'<option value="'+s+'" '+(c.status===s?'selected':'')+'>'+sl[s]+'</option>').join('');

  let html = '<div class="card"><h2>⚙️ '+esc(c.name)+' <span class="badge '+c.status+'">'+sl[c.status]+'</span></h2>'+
    '<p style="font-size:.82em;color:#a0a0b0;margin-bottom:16px">Token: <span class="token-tag">'+esc(c.token)+'</span> | <a href="competition.html?token='+encodeURIComponent(c.token)+'" target="_blank" style="color:#d4a574">公開頁面 ↗</a></p>'+
    '<div class="form-row"><div class="fg"><label>名稱 (中文)</label><input id="e_name" value="'+esc(c.name)+'"></div><div class="fg"><label>名稱 (英文)</label><input id="e_nameEn" value="'+esc(c.nameEn||'')+'"></div></div>'+
    '<div class="form-row"><div class="fg"><label>日期</label><input type="date" id="e_date" value="'+(c.date||'')+'"></div><div class="fg"><label>場地</label><input id="e_venue" value="'+esc(c.venue||'')+'"></div>'+
    '<div class="fg"><label>狀態</label><select id="e_status">'+statusOpts+'</select></div></div>'+
    '<div style="margin-top:14px;display:flex;gap:10px;flex-wrap:wrap"><button class="btn btn-p" onclick="saveInfo()">儲存基本資訊</button><button class="btn btn-d btn-sm" onclick="doDelete()">刪除賽事</button></div></div>';

  // Rules
  html += '<div class="card"><h2>📏 比賽規則</h2>'+
    '<div class="form-row"><div class="fg"><label>賽制</label><select id="e_format"><option '+(rules.format==='5v5'?'selected':'')+'>5v5</option><option '+(rules.format==='3v3'?'selected':'')+'>3v3</option></select></div>'+
    '<div class="fg"><label>上下半場 (分鐘)</label><input id="e_halves" value="'+(rules.halves||'')+'"></div>'+
    '<div class="fg"><label>節數</label><input id="e_quarters" value="'+(rules.quarters||'')+'"></div>'+
    '<div class="fg"><label>每節 (分鐘)</label><input id="e_qmin" value="'+(rules.quarterMinutes||'')+'"></div></div>'+
    '<div class="form-row"><div class="fg"><label>加時 (分鐘)</label><input id="e_ot" value="'+(rules.overtimeMinutes||'')+'"></div>'+
    '<div class="fg"><label>進攻時限 (秒)</label><input id="e_shot" value="'+(rules.shotClock||'')+'"></div>'+
    '<div class="fg"><label>球隊犯規</label><input id="e_tfoul" value="'+(rules.teamFouls||'')+'"></div>'+
    '<div class="fg"><label>個人犯規</label><input id="e_pfoul" value="'+(rules.playerFouls||'')+'"></div>'+
    '<div class="fg"><label>暫停次數</label><input id="e_to" value="'+(rules.timeouts||'')+'"></div></div>'+
    '<div class="fg" style="margin-bottom:12px"><label>其他規則備注</label><textarea id="e_notes">'+esc(rules.notes||'')+'</textarea></div>'+
    '<button class="btn btn-p btn-sm" onclick="saveRules()">儲存規則</button></div>';

  // Rundown
  html += '<div class="card"><h2>🕐 賽事流程</h2>'+
    '<div class="section-title"><span></span><button class="btn btn-o btn-sm" onclick="addRd()">+ 加一行</button></div>'+
    '<div id="rdBox">'+rundown.map(function(r,i){return rdRowHtml(r);}).join('')+'</div>'+
    '<div style="margin-top:12px"><button class="btn btn-p btn-sm" onclick="saveRundown()">儲存流程</button></div></div>';

  // Phases
  html += '<div class="card"><h2>📂 賽事階段</h2>'+
    '<div class="help-text" style="margin-bottom:12px">將比賽分成不同階段（如：初賽、盃賽複賽、碟賽複賽、決賽）。</div>'+
    '<div class="section-title"><span></span><button class="btn btn-o btn-sm" onclick="addPhase()">+ 加階段</button></div>'+
    '<div id="phaseBox">'+phases.map(function(p){return phaseRowHtml(p);}).join('')+'</div>'+
    '<div style="margin-top:12px"><button class="btn btn-p btn-sm" onclick="savePhases()">儲存階段</button></div></div>';

  // Matches
  html += '<div class="card"><h2>🏀 場次管理</h2>'+
    '<div class="help-text" style="margin-bottom:12px">設定「來源」可讓勝方/負方自動從前一場帶入（淘汰賽制）。</div>'+
    '<div class="section-title"><span>'+matches.length+' 場</span><button class="btn btn-o btn-sm" onclick="addMatch()">+ 新增場次</button></div>'+
    '<div id="matchBox">'+matches.map(function(m){return matchRowHtml(m,phases,matches);}).join('')+'</div>'+
    '<div style="margin-top:12px"><button class="btn btn-p" onclick="saveMatches()">💾 儲存所有場次</button></div></div>';

  document.getElementById('editForm').innerHTML = html;
}

// ── Save functions ──
async function saveInfo(){
  var pw=getPw();if(!pw)return;
  var r=await api({action:'update',token:S.comp.token,password:pw,name:gv('e_name'),nameEn:gv('e_nameEn'),date:gv('e_date'),venue:gv('e_venue'),status:gv('e_status')});
  showAlert('globalAlert',r.success?'✅ 已儲存':r.message,r.success?'success':'error');
}
async function saveRules(){
  var pw=getPw();if(!pw)return;
  var rules={format:gv('e_format'),halves:gv('e_halves'),quarters:gv('e_quarters'),quarterMinutes:gv('e_qmin'),overtimeMinutes:gv('e_ot'),shotClock:gv('e_shot'),teamFouls:gv('e_tfoul'),playerFouls:gv('e_pfoul'),timeouts:gv('e_to'),notes:gv('e_notes')};
  var r=await api({action:'update',token:S.comp.token,password:pw,rules:JSON.stringify(rules)});
  showAlert('globalAlert',r.success?'✅ 規則已儲存':r.message,r.success?'success':'error');
}
async function saveRundown(){
  var pw=getPw();if(!pw)return;
  var rows=document.querySelectorAll('#rdBox .dyn-row');
  var rd=Array.from(rows).map(function(r){var ins=r.querySelectorAll('input,select');return{time:ins[0].value,event:ins[1].value,type:ins[2].value};}).filter(function(r){return r.time||r.event;});
  var r=await api({action:'update',token:S.comp.token,password:pw,rundown:JSON.stringify(rd)});
  showAlert('globalAlert',r.success?'✅ 流程已儲存':r.message,r.success?'success':'error');
}
async function savePhases(){
  var pw=getPw();if(!pw)return;
  var rows=document.querySelectorAll('#phaseBox .dyn-row');
  var ph=Array.from(rows).map(function(r){var ins=r.querySelectorAll('input,select');return{id:ins[0].value||('ph_'+Date.now()+'_'+Math.random().toString(36).slice(2,6)),name:ins[1].value,type:ins[2].value};}).filter(function(r){return r.name;});
  var r=await api({action:'update',token:S.comp.token,password:pw,phases:JSON.stringify(ph)});
  showAlert('globalAlert',r.success?'✅ 階段已儲存':r.message,r.success?'success':'error');
  if(r.success){ S.comp.phases=ph; openEdit(S.comp.token); }
}
async function saveMatches(){
  var pw=getPw();if(!pw)return;
  var rows=document.querySelectorAll('#matchBox .me-row');
  var ms=Array.from(rows).map(function(r){
    var g=function(f){var el=r.querySelector('[data-f="'+f+'"]');return el?el.value:'';};
    var m={id:g('id')||('m_'+Date.now()+'_'+Math.random().toString(36).slice(2,6)),phaseId:g('phaseId'),gameNo:g('gameNo'),time:g('time'),teamA:g('teamA'),teamB:g('teamB'),scoreA:g('scoreA')!==''?Number(g('scoreA')):null,scoreB:g('scoreB')!==''?Number(g('scoreB')):null,status:g('status'),label:g('label')};
    var srcAm=g('srcAMatch'),srcAr=g('srcAResult'),srcBm=g('srcBMatch'),srcBr=g('srcBResult');
    if(srcAm) m.sourceA={matchId:srcAm,result:srcAr||'winner'};
    if(srcBm) m.sourceB={matchId:srcBm,result:srcBr||'winner'};
    return m;
  });
  var r=await api({action:'update',token:S.comp.token,password:pw,matches:JSON.stringify(ms)});
  showAlert('globalAlert',r.success?'✅ 場次已儲存':r.message,r.success?'success':'error');
  if(r.success) S.comp.matches=ms;
}
async function doDelete(){
  if(!confirm('確定刪除此賽事？'))return;
  var pw=getPw();if(!pw)return;
  var r=await api({action:'remove',token:S.comp.token,password:pw});
  showAlert('globalAlert',r.success?'✅ 已刪除':r.message,r.success?'success':'error');
  if(r.success){ document.getElementById('tabEdit').style.display='none'; showTab('list'); loadList(); }
}
</script>

<script>
// ── Dynamic row builders ──
function rdRowHtml(r){
  var types=['','match','ceremony','break','show'];
  var tl={'':'--',match:'比賽',ceremony:'儀式','break':'間歇',show:'表演'};
  var opts=types.map(function(t){return '<option value="'+t+'" '+(r.type===t?'selected':'')+'>'+tl[t]+'</option>';}).join('');
  return '<div class="dyn-row"><input value="'+esc(r.time||'')+'" placeholder="時間 (如 09:00-09:15)"><input value="'+esc(r.event||'')+'" placeholder="活動內容" style="flex:2"><select style="max-width:100px">'+opts+'</select><button class="btn btn-d btn-sm" onclick="this.parentElement.remove()">✕</button></div>';
}
function addRd(){ document.getElementById('rdBox').insertAdjacentHTML('beforeend',rdRowHtml({})); }

function phaseRowHtml(p){
  var types=['group','knockout','ceremony','show'];
  var tl={group:'分組/初賽',knockout:'淘汰賽',ceremony:'儀式',show:'表演'};
  var opts=types.map(function(t){return '<option value="'+t+'" '+(p.type===t?'selected':'')+'>'+tl[t]+'</option>';}).join('');
  return '<div class="dyn-row"><input value="'+esc(p.id||'')+'" placeholder="ID (自動)" style="max-width:120px;font-size:.78em;color:#a0a0b0"><input value="'+esc(p.name||'')+'" placeholder="階段名稱 (如：初賽)"><select style="max-width:130px">'+opts+'</select><button class="btn btn-d btn-sm" onclick="this.parentElement.remove()">✕</button></div>';
}
function addPhase(){ document.getElementById('phaseBox').insertAdjacentHTML('beforeend',phaseRowHtml({})); }

function matchRowHtml(m, phases, allMatches){
  var phOpts='<option value="">-- 無階段 --</option>'+(phases||[]).map(function(p){return '<option value="'+esc(p.id)+'" '+(m.phaseId===p.id?'selected':'')+'>'+esc(p.name)+'</option>';}).join('');
  var stOpts=['scheduled','live','completed'].map(function(s){return '<option value="'+s+'" '+(m.status===s?'selected':'')+'>'+({scheduled:'待賽',live:'進行中',completed:'完場'}[s])+'</option>';}).join('');
  // Source match options (all matches except self)
  var srcOpts='<option value="">-- 無 --</option>'+(allMatches||[]).filter(function(x){return x.id!==m.id;}).map(function(x){return '<option value="'+esc(x.id)+'" >第'+(x.gameNo||'?')+'場</option>';}).join('');
  var srcAm=m.sourceA?m.sourceA.matchId:'', srcAr=m.sourceA?m.sourceA.result:'winner';
  var srcBm=m.sourceB?m.sourceB.matchId:'', srcBr=m.sourceB?m.sourceB.result:'winner';

  return '<div class="me-row">'+
    '<input type="hidden" data-f="id" value="'+esc(m.id||'')+'">'+
    '<div class="me-grid">'+
      '<input data-f="gameNo" value="'+esc(String(m.gameNo||''))+'" placeholder="#" style="width:50px">'+
      '<input data-f="time" value="'+esc(m.time||'')+'" placeholder="時間段">'+
      '<input data-f="teamA" value="'+esc(m.teamA||'')+'" placeholder="隊伍 A">'+
      '<input data-f="scoreA" type="number" value="'+(m.scoreA!=null?m.scoreA:'')+'" placeholder="-" style="width:50px;text-align:center">'+
      '<span class="vs-lbl">:</span>'+
      '<input data-f="scoreB" type="number" value="'+(m.scoreB!=null?m.scoreB:'')+'" placeholder="-" style="width:50px;text-align:center">'+
      '<input data-f="teamB" value="'+esc(m.teamB||'')+'" placeholder="隊伍 B">'+
      '<select data-f="status">'+stOpts+'</select>'+
    '</div>'+
    '<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;align-items:center">'+
      '<div class="fg" style="flex:1;min-width:120px"><label>階段</label><select data-f="phaseId">'+phOpts+'</select></div>'+
      '<div class="fg" style="flex:1;min-width:120px"><label>備注標籤</label><input data-f="label" value="'+esc(m.label||'')+'" placeholder="如：盃賽複賽"></div>'+
      '<button class="btn btn-d btn-sm" style="align-self:flex-end" onclick="this.closest(\'.me-row\').remove()">刪除場次</button>'+
    '</div>'+
    '<div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:8px">'+
      '<div class="me-source"><span>隊伍A來源:</span><select data-f="srcAMatch" onchange="setSrcOpt(this,\''+esc(srcAm)+'\')">'+srcOpts.replace('value="'+esc(srcAm)+'"','value="'+esc(srcAm)+'" selected')+'</select>'+
        '<select data-f="srcAResult"><option value="winner" '+(srcAr==='winner'?'selected':'')+'>勝方</option><option value="loser" '+(srcAr==='loser'?'selected':'')+'>負方</option></select></div>'+
      '<div class="me-source"><span>隊伍B來源:</span><select data-f="srcBMatch" onchange="setSrcOpt(this,\''+esc(srcBm)+'\')">'+srcOpts.replace('value="'+esc(srcBm)+'"','value="'+esc(srcBm)+'" selected')+'</select>'+
        '<select data-f="srcBResult"><option value="winner" '+(srcBr==='winner'?'selected':'')+'>勝方</option><option value="loser" '+(srcBr==='loser'?'selected':'')+'>負方</option></select></div>'+
    '</div>'+
  '</div>';
}

function addMatch(){
  var phases=S.comp?S.comp.phases:[];
  var matches=S.comp?S.comp.matches:[];
  var newM={id:'',gameNo:'',time:'',teamA:'',teamB:'',scoreA:null,scoreB:null,status:'scheduled',label:'',phaseId:''};
  document.getElementById('matchBox').insertAdjacentHTML('beforeend',matchRowHtml(newM,phases,matches));
}

function setSrcOpt(el,val){/* placeholder for future enhancement */}
</script>
</body>
</html>
