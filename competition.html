*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,'Microsoft JhengHei','PingFang TC',sans-serif;line-height:1.6;color:#5a4a3a;background:linear-gradient(135deg,#f5e6d3,#e8d4b8);min-height:100vh}
.nb{background:linear-gradient(145deg,#d4a574,#c89860);padding:15px 0;box-shadow:0 10px 20px rgba(0,0,0,.15);position:sticky;top:0;z-index:100}
.nc{max-width:1100px;margin:0 auto;padding:0 30px;display:flex;justify-content:space-between;align-items:center}

.nk{display:flex;gap:20px}.nk a{color:#fff;text-decoration:none;font-weight:700;padding:8px 14px;border-radius:20px;transition:all .3s}.nk a:hover{background:rgba(255,255,255,.2)}
.hb{display:none;flex-direction:column;cursor:pointer;padding:5px}.hb span{width:25px;height:3px;background:#fff;margin:3px 0;border-radius:3px;transition:.3s}
.ct{max-width:1100px;margin:0 auto;padding:30px}
.ph{text-align:center;padding:40px 30px;background:linear-gradient(145deg,#f0dcc8,#e8d4b8);border-radius:30px;box-shadow:15px 15px 30px rgba(0,0,0,.12),-15px -15px 30px rgba(255,255,255,.7);margin-bottom:30px}
.ph h1{font-size:2.2em;color:#5a4a3a;font-weight:900;margin-bottom:8px}
.ph .sub{color:#7a6a5a;font-size:1em}
.badge{display:inline-block;padding:4px 14px;border-radius:20px;font-size:.85em;font-weight:700;margin-top:10px}
.badge.upcoming{background:#fff3cd;color:#856404}.badge.ongoing{background:#d1e7dd;color:#0a3622}.badge.completed{background:#cfe2ff;color:#084298}
.card{background:linear-gradient(145deg,#f0dcc8,#e8d4b8);border-radius:24px;padding:28px;margin-bottom:24px;box-shadow:12px 12px 24px rgba(0,0,0,.1),-12px -12px 24px rgba(255,255,255,.6)}
.card h2{font-size:1.3em;color:#d4a574;font-weight:900;margin-bottom:18px;padding-bottom:10px;border-bottom:2px solid rgba(212,165,116,.3)}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.info-item{background:rgba(255,255,255,.5);border-radius:12px;padding:12px 16px}
.info-item .lbl{font-size:.78em;color:#9a8a7a;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.info-item .val{font-size:1em;color:#5a4a3a;font-weight:700;margin-top:2px}
.rules-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.rule-box{background:rgba(255,255,255,.5);border-radius:12px;padding:12px;text-align:center}

.rd-type.match{background:#d1e7dd;color:#0a3622}.rd-type.ceremony{background:#e2d9f3;color:#5a3d8a}
.rd-type.break{background:#f8d7da;color:#842029}.rd-type.show{background:#fff3cd;color:#856404}

.phase-section{margin-bottom:8px}
.phase-header{background:linear-gradient(145deg,#d4a574,#c89860);color:#fff;padding:14px 20px;border-radius:16px 16px 0 0;font-weight:900;font-size:1.05em;display:flex;justify-content:space-between;align-items:center}
.phase-body{background:rgba(255,255,255,.35);border-radius:0 0 16px 16px;padding:4px 0;overflow-x:auto}
.match-row{display:grid;grid-template-columns:50px 110px 1fr 90px 1fr 80px;gap:8px;align-items:center;padding:10px 16px;border-bottom:1px solid rgba(212,165,116,.12);font-size:.9em}
.match-row:last-child{border-bottom:none}
.match-row:hover{background:rgba(255,255,255,.3)}
.game-no{color:#9a8a7a;font-size:.82em;font-weight:700}
.time-slot{color:#7a6a5a;font-size:.82em}
.team-name{font-weight:700;color:#5a4a3a;padding:4px 0}
.team-name.tbd{color:#b0a090;font-style:italic;font-weight:400}
.score-box{text-align:center;font-size:1.15em;font-weight:900;color:#d4a574;letter-spacing:2px}
.score-box .vs{color:#b0a090;font-size:.8em;font-weight:400}
.winner{color:#198754}.loser{color:#b0a090}
.status-pill{display:inline-block;padding:3px 10px;border-radius:10px;font-size:.72em;font-weight:700}
.status-pill.scheduled{background:#fff3cd;color:#856404}
.status-pill.live{background:#d1e7dd;color:#0a3622;animation:pulse 1.5s infinite}
.status-pill.completed{background:#cfe2ff;color:#084298}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.match-label{font-size:.72em;color:#9a8a7a;margin-top:2px}
.loading{text-align:center;padding:60px;color:#9a8a7a;font-size:1.1em}
.error-box{background:#fff3cd;border-radius:16px;padding:30px;text-align:center;color:#856404}
.error-box h3{font-size:1.3em;margin-bottom:8px}
.refresh-btn{background:rgba(255,255,255,.3);border:none;color:#5a4a3a;padding:6px 16px;border-radius:20px;cursor:pointer;font-size:.85em;font-weight:700;margin-left:12px;transition:all .3s}
.refresh-btn:hover{background:rgba(255,255,255,.6)}
.auto-tag{font-size:.7em;color:#9a8a7a;font-weight:400}
.ft{background:linear-gradient(145deg,#d4a574,#c89860);color:#fff;padding:40px 30px 25px;border-radius:40px 40px 0 0;margin:40px 20px 0}
.ft .fc{max-width:1100px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:25px;margin-bottom:25px}
.ft h4{font-size:1em;margin-bottom:12px;font-weight:900}.ft p,.ft a{font-size:.9em;line-height:1.8;color:#fff;text-decoration:none}
.ft .fb{text-align:center;padding-top:15px;border-top:1px solid rgba(255,255,255,.3);font-size:.85em;color:rgba(255,255,255,.8)}
.wf{position:fixed;width:60px;height:60px;bottom:25px;right:25px;background:linear-gradient(145deg,#25d366,#20b358);color:#fff;border-radius:50%;box-shadow:10px 10px 20px rgba(0,0,0,.2);z-index:1000;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:all .3s}
.wf:hover{transform:translateY(-5px) scale(1.05)}
@media(max-width:768px){
  .hb{display:flex}.nk{position:absolute;top:100%;left:0;right:0;background:linear-gradient(145deg,#d4a574,#c89860);flex-direction:column;gap:0;max-height:0;overflow:hidden;transition:max-height .3s}
  .nk.active{max-height:300px}.nk a{padding:12px 25px;border-radius:0;border-bottom:1px solid rgba(255,255,255,.1)}
  .nc{padding:0 15px}.nl{font-size:1.2em}.ct{padding:15px}

  .card{padding:18px;border-radius:18px}
  .match-row{grid-template-columns:40px 90px 1fr 70px 1fr 60px;gap:4px;padding:8px 10px;font-size:.82em}
  .score-box{font-size:1em}.rules-grid{grid-template-columns:repeat(2,1fr)}
  .rd-time{min-width:100px;font-size:.82em}
}

<script>
const API_URL = 'YOUR_APPS_SCRIPT_URL_HERE';
const token = new URLSearchParams(location.search).get('token');

if (!token) {
  document.getElementById('app').innerHTML = '<div class="error-box"><h3>⚠️ 找不到賽事</h3><p>請確認連結是否正確。每個賽事有獨立的連結。</p></div>';
} else { load(); }

async function api(params) {
  const res = await fetch(API_URL + '?' + new URLSearchParams(params));
  return res.json();
}

async function load() {
  try {
    const res = await api({ action:'getCompetition', token });
    if (!res.success) { document.getElementById('app').innerHTML = `<div class="error-box"><h3>⚠️ ${esc(res.message)}</h3></div>`; return; }
    render(res.competition);
  } catch(e) {
    document.getElementById('app').innerHTML = '<div class="error-box"><h3>⚠️ 載入失敗</h3><p>請稍後重試。</p></div>';
  }
}

function render(c) {
  document.title = c.name + ' | LaLaRef 急單王';
  const sl = {upcoming:'即將舉行',ongoing:'進行中',completed:'已完結'};
  const matches = c.matches || [];
  const phases = c.phases || [];

  // Resolve auto-progression team names
  const matchMap = {};
  matches.forEach(m => { matchMap[m.id] = m; });
  matches.forEach(m => {
    if (m.sourceA && !m.teamA) m.teamA = resolveSource(m.sourceA, matchMap);
    if (m.sourceB && !m.teamB) m.teamB = resolveSource(m.sourceB, matchMap);
  });

  let html = `
    <div class="ph">
      <h1>${esc(c.name)}</h1>
      ${c.nameEn ? `<div class="sub">${esc(c.nameEn)}</div>` : ''}
      <span class="badge ${c.status||'upcoming'}">${sl[c.status]||c.status}</span>
      <button class="refresh-btn" onclick="load()">🔄 更新</button>
    </div>
    <div class="card"><h2>📋 賽事資訊</h2><div class="info-grid">
      ${c.date ? `<div class="info-item"><div class="lbl">日期</div><div class="val">📅 ${esc(c.date)}</div></div>` : ''}
      ${c.venue ? `<div class="info-item"><div class="lbl">場地</div><div class="val">📍 ${esc(c.venue)}</div></div>` : ''}
    </div></div>
    ${renderRules(c.rules)}
    ${c.rundown.length ? renderRundown(c.rundown) : ''}
    ${renderPhases(phases, matches)}
  `;
  document.getElementById('app').innerHTML = html;
}

function resolveSource(src, map) {
  if (!src || !src.matchId) return '';
  const m = map[src.matchId];
  if (!m || m.status !== 'completed') {
    const gLabel = m ? ('第' + (m.gameNo||'?') + '場') : '?';
    return src.result === 'winner' ? gLabel + '勝方' : gLabel + '負方';
  }
  const aWin = (m.scoreA||0) > (m.scoreB||0);
  if (src.result === 'winner') return aWin ? m.teamA : m.teamB;
  return aWin ? m.teamB : m.teamA;
}

function renderRules(r) {
  if (!r || !Object.keys(r).length) return '';
  const items = [
    {k:'format',l:'賽制',s:''},{k:'halves',l:'上下半場',s:'分鐘'},
    {k:'quarters',l:'節數',s:'節'},{k:'quarterMinutes',l:'每節',s:'分鐘'},
    {k:'overtimeMinutes',l:'加時',s:'分鐘'},{k:'shotClock',l:'進攻時限',s:'秒'},
    {k:'teamFouls',l:'球隊犯規',s:'次'},{k:'playerFouls',l:'個人犯規',s:'次'},
    {k:'timeouts',l:'暫停次數',s:'次'}
  ].filter(i => r[i.k] !== undefined && r[i.k] !== '');
  if (!items.length && !r.notes) return '';
  return `<div class="card"><h2>📏 比賽規則</h2>
    <div class="rules-grid">${items.map(i=>`<div class="rule-box"><div class="rv">${r[i.k]}${i.s}</div><div class="rl">${i.l}</div></div>`).join('')}</div>
    ${r.notes ? `<div class="rules-notes">${esc(r.notes)}</div>` : ''}
  </div>`;
}

function renderRundown(rd) {
  const typeLabel = {match:'比賽',ceremony:'儀式',break:'間歇',show:'表演'};
  const typeClass = {match:'match',ceremony:'ceremony',break:'break',show:'show'};
  return `<div class="card"><h2>🕐 賽事流程</h2><ul class="rundown-list">
    ${rd.map(r => `<li>
      <span class="rd-time">${esc(r.time||'')}</span>
      <span class="rd-event">${esc(r.event||'')}</span>
      ${r.type ? `<span class="rd-type ${typeClass[r.type]||''}">${typeLabel[r.type]||r.type}</span>` : ''}
    </li>`).join('')}
  </ul></div>`;
}

function renderPhases(phases, matches) {
  if (!phases.length && !matches.length) return '';
  // If no phases defined, show all matches in one section
  if (!phases.length && matches.length) {
    return `<div class="card"><h2>🏀 對陣賽程</h2>${renderMatchList(matches)}</div>`;
  }
  // Group matches by phaseId
  const grouped = {};
  matches.forEach(m => { const pid = m.phaseId||'_none'; if(!grouped[pid]) grouped[pid]=[]; grouped[pid].push(m); });

  return phases.map(p => {
    const pm = grouped[p.id] || [];
    if (!pm.length) return '';
    return `<div class="phase-section">
      <div class="phase-header"><span>${esc(p.name)}</span><span style="font-size:.75em;font-weight:400">${pm.length} 場</span></div>
      <div class="phase-body">${renderMatchList(pm)}</div>
    </div>`;
  }).join('');
}

function renderMatchList(matches) {
  return matches.map(m => {
    const done = m.status === 'completed';
    const aW = done && (m.scoreA||0) > (m.scoreB||0);
    const bW = done && (m.scoreB||0) > (m.scoreA||0);
    const sl = {scheduled:'待賽',live:'🔴 進行中',completed:'完場'};
    const tA = m.teamA || 'TBD';
    const tB = m.teamB || 'TBD';
    const scoreHtml = done
      ? `<span class="${aW?'winner':'loser'}">${m.scoreA}</span> : <span class="${bW?'winner':'loser'}">${m.scoreB}</span>`
      : m.status==='live' ? `<span class="${m.scoreA!=null?'':'vs'}">${m.scoreA!=null?m.scoreA:''}</span> : <span>${m.scoreB!=null?m.scoreB:''}</span>`
      : '<span class="vs">vs</span>';
    return `<div class="match-row">
      <span class="game-no">${m.gameNo ? '#'+m.gameNo : ''}</span>
      <span class="time-slot">${esc(m.time||'')}</span>
      <span class="team-name ${!m.teamA?'tbd':''} ${aW?'winner':done?'loser':''}">${esc(tA)}</span>
      <span class="score-box">${scoreHtml}</span>
      <span class="team-name ${!m.teamB?'tbd':''} ${bW?'winner':done?'loser':''}">${esc(tB)}</span>
      <span><span class="status-pill ${m.status||'scheduled'}">${sl[m.status]||m.status}</span>${m.label?`<div class="match-label">${esc(m.label)}</div>`:''}</span>
    </div>`;
  }).join('');
}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toggleMenu(){document.querySelector('.hb').classList.toggle('active');document.getElementById('navLinks').classList.toggle('active');}
document.querySelectorAll('.nk a').forEach(a=>a.addEventListener('click',()=>{document.querySelector('.hb').classList.remove('active');document.getElementById('navLinks').classList.remove('active');}));
</script>
