.wf{position:fixed;width:70px;height:70px;bottom:30px;right:30px;background:linear-gradient(145deg,#25d366,#20b358);color:#FFF;border-radius:50%;box-shadow:15px 15px 30px rgba(0,0,0,.2),-15px -15px 30px rgba(255,255,255,.3);z-index:1000;display:flex;align-items:center;justify-content:center;transition:all .3s;text-decoration:none}
.wf:hover{transform:translateY(-8px) scale(1.05)}

@media(max-width:768px){

}

<div class="ct">
<header class="ph"><h1> 賽事對陣表</h1><p>Competition Bracket</p><div class="tags"><span class="tag" id="tagName">未設定賽事</span><span class="tag" id="tagDate">--</span></div></header>
<button class="admin-toggle" onclick="toggleAP()"> 管理賽事 / Admin</button>
<div class="admin-panel" id="adminPanel"></div>
<div id="bracketDisplay"></div>
<div class="share-section"><h2> 分享賽事狀況</h2><p style="color:#7a6a5a;margin-bottom:15px">Share this bracket with others</p><div class="share-btns"><button class="share-btn wa" onclick="shareWA()"> WhatsApp 分享</button><button class="share-btn copy" onclick="copyLink()"> 複製連結</button></div></div>

<script>
function toggleMenu(){document.querySelector('.hb').classList.toggle('active');document.getElementById('navLinks').classList.toggle('active')}
document.querySelectorAll('.nk a').forEach(function(a){a.addEventListener('click',function(){document.querySelector('.hb').classList.remove('active');document.getElementById('navLinks').classList.remove('active')})});

var D={en:'',ed:'',t:['A1','A2','A3','A4','A5','A6','A7','A8'],s:{}};
var games={g1:[0,1],g2:[2,3],g3:[4,5],g4:[6,7],g5:['g1w','g2w'],g6:['g3w','g4w'],g7:['g1l','g2l'],g8:['g3l','g4l'],g9:['g7w','g8w'],g10:['g5w','g6w']};

function init(){
var p=new URLSearchParams(window.location.search);
var dd=p.get('d');
if(dd){try{D=JSON.parse(atob(dd))}catch(e){}}
else{var s=localStorage.getItem('compData');if(s)try{D=JSON.parse(s)}catch(e){}}
if(!D.t)D.t=['A1','A2','A3','A4','A5','A6','A7','A8'];
if(!D.s)D.s={};
document.getElementById('tagName').textContent=D.en||'未設定賽事';
document.getElementById('tagDate').textContent=D.ed||'--';
buildAP();render();
}

function gw(gid){
var sc=D.s[gid];
if(!sc||sc[0]===''||sc[1]===''||sc[0]===undefined||sc[1]===undefined)return -1;
var a=parseInt(sc[0]),b=parseInt(sc[1]);
if(isNaN(a)||isNaN(b)||a===b)return -1;
return a>b?0:1;
}

function gl(gid){var w=gw(gid);if(w===-1)return -1;return w===0?1:0;}

function gt(gid,side){
var ref=games[gid][side];
if(typeof ref==='number')return D.t[ref]||('A'+(ref+1));
var m=ref.match(/^(g\d+)(w|l)$/);
if(m){var fn=m[2]==='w'?gw:gl;var r=fn(m[1]);if(r===-1)return '待定';var src=games[m[1]];if(typeof src[r]==='number')return D.t[src[r]]||('A'+(src[r]+1));return gt(m[1],r);}
return '待定';
}

function mh(gid,label,isFinal){
var t1=gt(gid,0),t2=gt(gid,1);
var sc=D.s[gid]||['',''];
var w=gw(gid);
var cls=isFinal?'match-card final':'match-card';
var trophy='';
if(isFinal&&w!==-1){trophy='<div class="trophy"> '+(w===0?t1:t2)+'</div>';}
return '<div class="'+cls+'"><div class="match-label">'+label+'</div>'+
'<div class="match-team'+(w===0?' winner':'')+'"><span class="tname">'+t1+'</span><span class="score">'+(sc[0]!==''?sc[0]:'-')+'</span></div>'+
'<div class="match-team'+(w===1?' winner':'')+'"><span class="tname">'+t2+'</span><span class="score">'+(sc[1]!==''?sc[1]:'-')+'</span></div>'+trophy+'</div>';
}

function render(){
var h='';
h+='<div class="bracket-title"> 盃賽 Cup Bracket</div>';
h+='<div class="round-label">第一輪 First Round</div><div class="matches">';
h+=mh('g1','Game 1',false)+mh('g2','Game 2',false)+mh('g3','Game 3',false)+mh('g4','Game 4',false);
h+='</div><div class="round-label">盃賽準決賽 Cup Semi-Finals</div><div class="matches">';
h+=mh('g5','Game 5 (W1 vs W2)',false)+mh('g6','Game 6 (W3 vs W4)',false);
h+='</div><div class="round-label">盃賽決賽 Cup Final</div><div class="matches">';
h+=mh('g10','Game 10 - 盃賽冠軍',true);
h+='</div>';
h+='<div class="bracket-title"> 碟賽 Plate Bracket</div>';
h+='<div class="round-label">碟賽準決賽 Plate Semi-Finals</div><div class="matches">';
h+=mh('g7','Game 7 (L1 vs L2)',false)+mh('g8','Game 8 (L3 vs L4)',false);
h+='</div><div class="round-label">碟賽決賽 Plate Final</div><div class="matches">';
h+=mh('g9','Game 9 - 碟賽冠軍',true);
h+='</div>';
document.getElementById('bracketDisplay').innerHTML=h;
}

function buildAP(){
var h='<h2> 賽事管理 Admin Panel</h2>';
h+='<div class="admin-section"><h3> 賽事資料</h3>';
h+='<label>賽事名稱 Event Name</label><input type="text" id="aEN" value="'+(D.en||'')+'">';
h+='<label>賽事日期 Event Date</label><input type="text" id="aED" value="'+(D.ed||'')+'">';
h+='</div>';
h+='<div class="admin-section"><h3> 隊伍名稱 Team Names</h3>';
for(var i=0;i<8;i++){
if(i%2===0)h+='<div class="admin-row">';
h+='<div><label>A'+(i+1)+'</label><input type="text" id="aT'+i+'" value="'+(D.t[i]||'A'+(i+1))+'"></div>';
if(i%2===1)h+='</div>';
}
h+='</div>';
var glist=[['g1','Game 1'],['g2','Game 2'],['g3','Game 3'],['g4','Game 4'],['g5','Game 5'],['g6','Game 6'],['g7','Game 7'],['g8','Game 8'],['g9','Game 9'],['g10','Game 10']];
h+='<div class="admin-section"><h3> 比分 Scores</h3>';
for(var j=0;j<glist.length;j++){
var g=glist[j],sc=D.s[g[0]]||['',''];
h+='<label>'+g[1]+' ('+gt(g[0],0)+' vs '+gt(g[0],1)+')</label>';
h+='<div class="admin-row"><div><input type="number" class="score-input" id="aS_'+g[0]+'_0" value="'+sc[0]+'" min="0" placeholder="-"></div>';
h+='<div><input type="number" class="score-input" id="aS_'+g[0]+'_1" value="'+sc[1]+'" min="0" placeholder="-"></div></div>';
}
h+='</div>';
h+='<button class="save-btn" onclick="saveAll()"> 儲存 Save</button>';
document.getElementById('adminPanel').innerHTML=h;
}

function saveAll(){
D.en=document.getElementById('aEN').value;
D.ed=document.getElementById('aED').value;
for(var i=0;i<8;i++)D.t[i]=document.getElementById('aT'+i).value||('A'+(i+1));
var gids=['g1','g2','g3','g4','g5','g6','g7','g8','g9','g10'];
for(var j=0;j<gids.length;j++){
var a=document.getElementById('aS_'+gids[j]+'_0').value;
var b=document.getElementById('aS_'+gids[j]+'_1').value;
if(a!==''||b!=='')D.s[gids[j]]=[a,b];
else delete D.s[gids[j]];
}
localStorage.setItem('compData',JSON.stringify(D));
document.getElementById('tagName').textContent=D.en||'未設定賽事';
document.getElementById('tagDate').textContent=D.ed||'--';
buildAP();render();showToast('已儲存 Saved!');
}

function toggleAP(){document.getElementById('adminPanel').classList.toggle('show')}

function getShareURL(){
var encoded=btoa(unescape(encodeURIComponent(JSON.stringify(D))));
return window.location.origin+window.location.pathname+'?d='+encoded;
}

function shareWA(){
var url=getShareURL();
var text=(D.en||'籃球賽事')+'%0A'+(D.ed||'')+'%0A'+url;
window.open('https://wa.me/?text='+text,'_blank');
}

function copyLink(){
var url=getShareURL();
if(navigator.clipboard){navigator.clipboard.writeText(url).then(function(){showToast('連結已複製 Link Copied!')});}
else{var t=document.createElement('textarea');t.value=url;document.body.appendChild(t);t.select();document.execCommand('copy');document.body.removeChild(t);showToast('連結已複製 Link Copied!');}
}

function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000);}

init();
</script>
