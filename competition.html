body{font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,'Microsoft JhengHei','PingFang TC',sans-serif;line-height:1.6;color:#5a4a3a;background:linear-gradient(135deg,#f5e6d3,#e8d4b8);min-height:100vh}

.hb{display:none;flex-direction:column;cursor:pointer;padding:5px}
.hb span{width:25px;height:3px;background:#fff;margin:3px 0;border-radius:3px;transition:.3s}
.ct{max-width:1100px;margin:0 auto;padding:30px}

.rule-box{background:rgba(255,255,255,.5);border-radius:12px;padding:12px;text-align:center}

.rules-notes{margin-top:14px;background:rgba(255,255,255,.4);border-radius:12px;padding:14px;font-size:.9em;color:#5a4a3a;white-space:pre-wrap}

.rundown-list{list-style:none}

.rundown-list li:last-child{border-bottom:none}
.rd-time{min-width:130px;font-weight:700;color:#d4a574;font-size:.9em}
.rd-event{color:#5a4a3a;font-size:.95em}
/* Bracket */
.match-table{width:100%;border-collapse:collapse}
.match-table th{background:rgba(212,165,116,.3);padding:10px 14px;text-align:left;font-size:.82em;color:#7a6a5a;font-weight:700;text-transform:uppercase}
.match-table td{padding:10px 14px;border-bottom:1px solid rgba(212,165,116,.15);font-size:.92em;vertical-align:middle}
.match-table tr:hover td{background:rgba(255,255,255,.3)}
.team-cell{font-weight:700;color:#5a4a3a}
.score-cell{font-size:1.2em;font-weight:900;color:#d4a574;text-align:center;min-width:80px}
.score-vs{color:#9a8a7a;font-size:.85em;text-align:center}
.status-pill{display:inline-block;padding:3px 10px;border-radius:10px;font-size:.75em;font-weight:700}
.status-pill.scheduled{background:#fff3cd;color:#856404}
.status-pill.live{background:#d1e7dd;color:#0a3622;animation:pulse 1.5s infinite}
.status-pill.completed{background:#cfe2ff;color:#084298}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
.match-label{font-size:.78em;color:#9a8a7a;margin-top:2px}
.winner{color:#198754;font-weight:900}
.loser{color:#9a8a7a}
/* Loading / error */

.error-box{background:#fff3cd;border-radius:16px;padding:30px;text-align:center;color:#856404}
.error-box h3{font-size:1.3em;margin-bottom:8px}
/* Footer */

.ft .fb{text-align:center;padding-top:15px;border-top:1px solid rgba(255,255,255,.3);font-size:.85em;color:rgba(255,255,255,.8)}
.wf{position:fixed;width:60px;height:60px;bottom:25px;right:25px;background:linear-gradient(145deg,#25d366,#20b358);color:#fff;border-radius:50%;box-shadow:10px 10px 20px rgba(0,0,0,.2);z-index:1000;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:all .3s}
.wf:hover{transform:translateY(-5px) scale(1.05)}
.refresh-btn{background:rgba(255,255,255,.3);border:none;color:#5a4a3a;padding:6px 16px;border-radius:20px;cursor:pointer;font-size:.85em;font-weight:700;margin-left:12px;transition:all .3s}
.refresh-btn:hover{background:rgba(255,255,255,.6)}
@media(max-width:768px){
  .hb{display:flex}.nk{position:absolute;top:100%;left:0;right:0;background:linear-gradient(145deg,#d4a574,#c89860);flex-direction:column;gap:0;padding:0;max-height:0;overflow:hidden;transition:max-height .3s}
  .nk.active{max-height:300px}.nk a{padding:12px 25px;border-radius:0;border-bottom:1px solid rgba(255,255,255,.1)}
  .nc{padding:0 15px}.nl{font-size:1.2em}.ct{padding:15px}
  .ph{padding:25px 15px}.ph h1{font-size:1.5em}
  .card{padding:18px}.match-table th,.match-table td{padding:8px 10px;font-size:.82em}
  .score-cell{min-width:60px}.rd-time{min-width:110px;font-size:.82em}
  .rules-grid{grid-template-columns:repeat(2,1fr)}
}

<script>
// ── CONFIG ────────────────────────────────────────────────────
const API_URL = 'YOUR_APPS_SCRIPT_URL_HERE'; // ← paste your deployed Apps Script URL

// ── INIT ──────────────────────────────────────────────────────
const token = new URLSearchParams(location.search).get('token');

if (!token) {
  document.getElementById('app').innerHTML = `
    <div class="error-box">
      <h3>⚠️ 找不到賽事</h3>
      <p>請確認連結是否正確。每個賽事有獨立的連結。</p>
    </div>`;
} else {
  loadCompetition();
}

async function api(params) {
  const url = API_URL + '?' + new URLSearchParams(params).toString();
  const res = await fetch(url);
  return res.json();
}

async function loadCompetition() {
  try {
    const [cRes, mRes] = await Promise.all([
      api({ action: 'getCompetition', token }),
      api({ action: 'getMatches', token })
    ]);
    if (!cRes.success) {
      document.getElementById('app').innerHTML = `<div class="error-box"><h3>⚠️ 找不到賽事</h3><p>${cRes.message}</p></div>`;
      return;
    }
    render(cRes.competition, mRes.matches || []);
  } catch (e) {
    document.getElementById('app').innerHTML = `<div class="error-box"><h3>⚠️ 載入失敗</h3><p>請稍後重試或聯絡主辦單位。</p></div>`;
  }
}

function render(comp, matches) {
  const rules = comp.rules || {};
  const rundown = comp.rundown || [];
  document.title = `${comp.name} | LaLaRef 急單王`;

  const statusLabel = { upcoming: '即將舉行', ongoing: '進行中', completed: '已完結' };
  const statusClass = comp.status || 'upcoming';

  document.getElementById('app').innerHTML = `
    <div class="ph">
      <h1>${comp.name}</h1>
      ${comp.nameEn ? `<div class="sub">${comp.nameEn}</div>` : ''}
      <span class="badge ${statusClass}">${statusLabel[statusClass] || statusClass}</span>
      <button class="refresh-btn" onclick="loadCompetition()">🔄 更新</button>
    </div>

    <div class="card">
      <h2>📋 賽事資訊</h2>
      <div class="info-grid">
        ${comp.date ? `<div class="info-item"><div class="lbl">日期</div><div class="val">📅 ${comp.date}</div></div>` : ''}
        ${comp.venue ? `<div class="info-item"><div class="lbl">場地</div><div class="val">📍 ${comp.venue}</div></div>` : ''}
      </div>
    </div>

    ${renderRules(rules)}
    ${rundown.length ? renderRundown(rundown) : ''}
    ${matches.length ? renderBracket(matches) : ''}
  `;
}

function renderRules(rules) {
  if (!rules || !Object.keys(rules).length) return '';
  const items = [
    { key: 'format',         label: '賽制',     suffix: '' },
    { key: 'halves',         label: '上下半場', suffix: '分鐘' },
    { key: 'quarters',       label: '節數',     suffix: '節' },
    { key: 'quarterMinutes', label: '每節',     suffix: '分鐘' },
    { key: 'overtimeMinutes',label: '加時',     suffix: '分鐘' },
    { key: 'shotClock',      label: '進攻時限', suffix: '秒' },
    { key: 'teamFouls',      label: '球隊犯規', suffix: '次' },
    { key: 'playerFouls',    label: '個人犯規', suffix: '次' },
    { key: 'timeouts',       label: '暫停次數', suffix: '次' },
  ].filter(i => rules[i.key] !== undefined && rules[i.key] !== '');

  if (!items.length && !rules.notes) return '';

  return `<div class="card">
    <h2>📏 比賽規則</h2>
    <div class="rules-grid">
      ${items.map(i => `<div class="rule-box"><div class="rv">${rules[i.key]}${i.suffix}</div><div class="rl">${i.label}</div></div>`).join('')}
    </div>
    ${rules.notes ? `<div class="rules-notes">${escHtml(rules.notes)}</div>` : ''}
  </div>`;
}

function renderRundown(rundown) {
  return `<div class="card">
    <h2>🕐 賽事流程</h2>
    <ul class="rundown-list">
      ${rundown.map(r => `<li><span class="rd-time">${escHtml(r.time)}</span><span class="rd-event">${escHtml(r.event)}</span></li>`).join('')}
    </ul>
  </div>`;
}

function renderBracket(matches) {
  const rows = matches.map(m => {
    const done = m.status === 'completed';
    const aWin = done && m.scoreA > m.scoreB;
    const bWin = done && m.scoreB > m.scoreA;
    const statusLabel = { scheduled: '待賽', live: '進行中', completed: '完場' };
    const scoreHtml = done
      ? `<span class="${aWin ? 'winner' : 'loser'}">${m.scoreA}</span> : <span class="${bWin ? 'winner' : 'loser'}">${m.scoreB}</span>`
      : `<span class="score-vs">vs</span>`;

    return `<tr>
      <td style="color:#9a8a7a;font-size:.85em">${m.gameNo ? '第' + m.gameNo + '場' : ''}</td>
      <td style="color:#9a8a7a;font-size:.85em">${escHtml(m.timeSlot || '')}</td>
      <td class="team-cell ${aWin ? 'winner' : ''}">${escHtml(m.teamA || 'TBD')}</td>
      <td class="score-cell">${scoreHtml}</td>
      <td class="team-cell ${bWin ? 'winner' : ''}">${escHtml(m.teamB || 'TBD')}</td>
      <td><span class="status-pill ${m.status || 'scheduled'}">${statusLabel[m.status] || m.status}</span>${m.label ? `<div class="match-label">${escHtml(m.label)}</div>` : ''}</td>
    </tr>`;
  }).join('');

  return `<div class="card">
    <h2>🏀 對陣賽程</h2>
    <div style="overflow-x:auto">
      <table class="match-table">
        <thead><tr><th>場次</th><th>時間</th><th>隊伍 A</th><th>比分</th><th>隊伍 B</th><th>狀態</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleMenu() {
  document.querySelector('.hb').classList.toggle('active');
  document.getElementById('navLinks').classList.toggle('active');
}
document.querySelectorAll('.nk a').forEach(a => a.addEventListener('click', () => {
  document.querySelector('.hb').classList.remove('active');
  document.getElementById('navLinks').classList.remove('active');
}));
</script>
